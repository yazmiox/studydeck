name: Build and Release

on:
  workflow_dispatch: # Adds a "Run workflow" button in the Actions tab

jobs:
  build:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        # Build on Windows, Mac, and Ubuntu
        os: [windows-latest, macos-latest, ubuntu-latest]

    permissions:
      contents: write # Important: allows the workflow to upload binaries to releases

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # Linux requires these dependencies to build .deb and .rpm packages
      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y fakeroot dpkg rpm

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install

      - name: Publish Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # This compiles the app and attaches the .exe, .dmg, and .deb to the release you just created
        run: pnpm run publish
